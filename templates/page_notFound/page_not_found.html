<!DOCTYPE html>
<html>

<head>

    <style>
        .page_404 {
            padding: 0;
            background: #fff;
            font-family: 'Arvo', serif;
        }

        .page_404 img {
            width: 100%;
        }

        .four_zero_four_bg {
            background-image: url(/static/images/404gif/ops404.gif);
            height: 350px;
            background-position: center;
        }

        .four_zero_four_bg h3 {
            display: flex;
            justify-content: center;
            text-align: center;
            align-items: center;
            font-size: 80px;
        }

        .contant_box_404 {
            margin-top: -50px;
            text-align: center;
        }



        #notfound {
            position: relative;
            height: 43vh;
        }

        .notfound {
            max-width: 365px;
            width: 100%;
            line-height: 1.4;
            text-align: center;
        }

        #notfound .notfound {
            position: absolute;
            left: 50%;
            top: 50%;
            -webkit-transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
        }

        .notfound .notfound-404 {
            position: relative;
            height: 137px;
            margin: 0 auto 20px;
            z-index: -1;
        }

        .notfound .notfound-404 h1 {
            font-family: montserrat, sans-serif;
            font-size: 160px;
            font-weight: 200;
            margin: 0;
            color: #211b19;
            text-transform: uppercase;
            position: absolute;
            left: 50%;
            top: 50%;
            -webkit-transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
        }

        .notfound .notfound-404 h2 {
            font-family: montserrat, sans-serif;
            font-size: 16px;
            font-weight: 400;
            text-transform: uppercase;
            color: #211b19;
            background: #fff;
            padding: 10px 5px;
            margin: auto;
            display: inline-block;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .notfound a {
            font-family: montserrat, sans-serif;
            display: inline-block;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            padding: 13px 23px;
            background: #39ac31;
            font-size: 15px;
            -webkit-transition: .2s all;
            transition: .2s all;
        }
    </style>
</head>

<body>
    <section class="page_404">
        <div class="container">
            <div class="row">
                <div class="col-sm-12 ">
                    <div class="col-sm-10 col-sm-offset-1  text-center">
                        <div class="four_zero_four_bg">

                        </div>

                        <div class="contant_box_404">
                            <div id="notfound">
                                <div class="notfound">
                                    <div class="notfound-404">
                                        <h1>Oops!</h1>
                                        <h2>404 - The Page can't be found</h2>
                                    </div>
                                    <a href="/accounts/profile/">Go to Home</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
